name: CI/CD Pipeline 2

on:
  push:
    branches: [ main ]

jobs:
  # 1️⃣ Automated Testing
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: cd site1 && npm install
      - name: Run tests
        run: cd site1 && npm test

  # 2️⃣ Docker Build & Push
  docker_build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3
      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME2 }}
          password: ${{ secrets.DOCKER_PASSWORD2 }}
      - name: Build Docker image
        run: docker build -t docker.io/allalia12yasmine/site1-image ./site1
      - name: Push Docker image
        run: docker push docker.io/allalia12yasmine/site1-image

  # 3️⃣ Security Scanning with Trivy
  security_scan:
    runs-on: ubuntu-latest
    needs: docker_build
    steps:
      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: docker.io/allalia12yasmine/site1-image

  # 4️⃣ Deployment stage
  deploy:
    runs-on: ubuntu-latest
    needs: security_scan
    steps:
      - name: Deployment step
        run: echo "Deployment logic goes here (e.g., kubectl, ssh, or other)"
