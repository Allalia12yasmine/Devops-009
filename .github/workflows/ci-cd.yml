name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm install
      - run: npm test

  docker_build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3
      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build Docker image
        run: docker build -t site1-image site1
      - name: Push Docker image
        run: docker push site1-image

  security_scan:
    runs-on: ubuntu-latest
    needs: docker_build
    steps:
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: site1-image

  deploy:
    runs-on: ubuntu-latest
    needs: security_scan
    steps:
      - name: Deployment step
        run: echo "Deployment logic goes here (e.g., kubectl, ssh, or other)"
